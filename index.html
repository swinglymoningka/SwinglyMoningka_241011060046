<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Notation Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(-45deg, #0f0f1a, #1a1a40, #3a0ca3, #7209b7);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* CARD */
.container {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 18px;
    text-align: center;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);

    border: 2px solid rgba(255,255,255,0.2);

    box-shadow:
        0 0 10px #7209b7,
        0 0 20px #3a0ca3,
        0 0 30px #4361ee;

    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        box-shadow: 0 0 10px #7209b7;
    }
    to {
        box-shadow: 0 0 25px #4361ee;
    }
}

/* TITLE */
h1 {
    color: white;
    font-size: 22px;
    margin-bottom: 15px;
}

/* INPUT */
input, button {
    width: 100%;
    box-sizing: border-box;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
}

input::placeholder {
    color: #ccc;
}

/* BUTTON */
button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #7209b7, #3a0ca3);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* RESULT */
#result {
    margin-top: 15px;
    font-size: 16px;
    font-weight: bold;
}

.valid { color: #00ffae; }
.decimal { color: #4cc9f0; }
.invalid { color: #ff4d6d; }

/* EXAMPLES */
.examples {
    margin-top: 20px;
    text-align: left;
    font-size: 13px;
    color: #ddd;
}

.examples span {
    display: block;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Scientific Notation Checker</h1>

    <input type="text" id="input" placeholder="Example: -3.1 x 10^-3">

    <button onclick="runCheck()">Check</button>

    <div id="result"></div>

    <!-- EXAMPLES -->
    <div class="examples">
        <b>✔ Valid Examples:</b>
        <span>3 x 10^2</span>
        <span>-5.3 x 10^-4</span>
        <span>4.321 x 10^3</span>
        <span>2 x 10^-1</span>
        <span>7.5 x 10^6</span>

        <br>

        <b>✖ Invalid Examples:</b>
        <span>300</span>
        <span>3x102</span>
        <span>abc</span>
        <span>10^3</span>
        <span>3 x 10</span>
    </div>

</div>

<script>
function runCheck() {
    let input = document.getElementById("input").value.trim();
    let result = document.getElementById("result");

    let sciRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)\s*x\s*10\^[-+]?\d+$/i;
    let decRegex = /^[+-]?(\d+(\.\d+)?|\.\d+)$/;

    if (sciRegex.test(input)) {
        result.innerText = "Valid Scientific Notation";
        result.className = "valid";
    }
    else if (decRegex.test(input)) {
        result.innerText = "Decimal Number (Not Scientific)";
        result.className = "decimal";
    }
    else {
        result.innerText = "Invalid Format";
        result.className = "invalid";
    }
}

// ENTER SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") runCheck();
});
</script>

</body>
</html>
