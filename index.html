<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Number Checker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1b1b2f, #16213e, #3a0ca3);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 380px;
    text-align: center;

    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* TOP BUTTON */
.top-bar {
    margin-bottom: 10px;
}

.top-btn {
    padding: 6px 12px;
    margin: 3px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 13px;
}

/* TITLE */
h1 {
    color: white;
    font-size: 20px;
    margin-bottom: 15px;
}

/* FIX SEJAJAR */
input, button {
    width: 100%;
    box-sizing: border-box;
}

/* INPUT */
input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

/* BUTTON */
button {
    background: #7209b7;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
}

/* HISTORY BOX */
#history-box {
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 13px;
    color: white;
    border-top: 1px solid rgba(255,255,255,0.3);
    padding-top: 10px;
}

/* PAGINATION */
.pagination {
    margin-top: 5px;
    font-size: 12px;
    color: #ddd;
}

/* ABOUT */
#about {
    margin-top: 10px;
    font-size: 13px;
    color: #ddd;
}
</style>
</head>

<body>

<div class="container">

    <!-- MENU DEKAT -->
    <div class="top-bar">
        <span class="top-btn" onclick="downloadHistory()">File</span>
        <span class="top-btn" onclick="toggleAbout()">About Me</span>
    </div>

    <h1>Scientific Number Checker</h1>

    <input type="text" id="input" placeholder="Type something here...">
    <button onclick="checkInput()">Check</button>

    <!-- HISTORY -->
    <div id="history-box"></div>
    <div class="pagination" id="pagination"></div>

    <!-- ABOUT -->
    <div id="about"></div>

</div>

<script>
let historyData = [];
let currentPage = 1;
const perPage = 10;
let aboutVisible = false;

function checkInput() {
    let inputField = document.getElementById("input");
    let value = inputField.value;

    if (value.trim() === "") return;

    let output;

    if (!isNaN(value)) {
        output = value + " → is a number";
    } else {
        output = value + " → not a number";
    }

    historyData.push(output);
    currentPage = Math.ceil(historyData.length / perPage);

    renderHistory();
    inputField.value = "";
}

function renderHistory() {
    let historyBox = document.getElementById("history-box");
    let pagination = document.getElementById("pagination");

    let start = (currentPage - 1) * perPage;
    let end = start + perPage;

    let pageData = historyData.slice(start, end);

    historyBox.innerHTML = pageData.join("<br>");

    let totalPages = Math.ceil(historyData.length / perPage);
    pagination.innerHTML = totalPages > 1 ? currentPage + "/" + totalPages : "";
}

// ENTER SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkInput();
});

// DOWNLOAD
function downloadHistory() {
    let content = "Scientific Number Checker Log\n\n" + historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "history.txt";
    a.click();
}

// ABOUT
function toggleAbout() {
    let about = document.getElementById("about");

    if (!aboutVisible) {
        about.innerHTML = `
            <hr>
            Name: Swingly Moningka<br>
            NIM: 241011060046<br>
            Class: Information System 24
        `;
        aboutVisible = true;
    } else {
        about.innerHTML = "";
        aboutVisible = false;
    }
}
</script>

</body>
</html>
