<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Notation Checker</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1b1b2f, #16213e, #3a0ca3);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 380px;
    text-align: center;

    border: 1px solid rgba(255,255,255,0.3);
}

/* MENU */
.menu {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
}

.menu span {
    color: white;
    cursor: pointer;
}

/* TITLE */
h1 {
    color: white;
    font-size: 18px;
}

/* INPUT */
input, button {
    width: 100%;
    box-sizing: border-box;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

button {
    background: #7209b7;
    color: white;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

/* RESULT */
#result {
    margin-top: 15px;
    font-size: 18px;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <div class="menu">
        <span onclick="downloadHistory()">File</span>
        <span onclick="alert('Edit menu (optional)')">Edit</span>
        <span onclick="checkScientific()">Run</span>
        <span onclick="showAbout()">About</span>
    </div>

    <h1>Scientific Notation Checker</h1>

    <input type="text" id="input" placeholder="Example: -3.1 x 10^-3">

    <button onclick="checkScientific()">Check</button>

    <div id="result"></div>

</div>

<script>
let historyData = [];

function checkScientific() {
    let input = document.getElementById("input").value.trim();
    let result = document.getElementById("result");

    // REGEX SCIENTIFIC NOTATION
    let regex = /^[+-]?(\d+(\.\d+)?|\.\d+)\s*x\s*10\^[-+]?\d+$/i;

    if (regex.test(input)) {
        result.innerText = "Yes";
        historyData.push(input + " → Yes");
    } else {
        result.innerText = "No";
        historyData.push(input + " → No");
    }
}

// ENTER SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkScientific();
});

// FILE DOWNLOAD
function downloadHistory() {
    let content = historyData.join("\n");
    let blob = new Blob([content], { type: "text/plain" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "result.txt";
    a.click();
}

// ABOUT
function showAbout() {
    alert("Swingly Moningka\n241011060046\nInformation System 24");
}
</script>

</body>
</html>
